name: CI

on:
  push:
    branches:
      - "**"
      - "!ant/**"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Lightweight smoke (replaces heavy build-test).
  # Heavy verification (npm test, build, e2e) requires manual trigger
  # or running on samstep74 mirror until private Actions quota is
  # restored. See Issue #8.
  smoke:
    name: smoke (clone + version check)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'

      - name: Echo repo info
        run: |
          echo "Repo: ${{ github.repository }}"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Node: $(node --version)"
          echo "Files in root:"
          ls -la

      - name: Verify package.json
        run: |
          echo "Name: $(node -p "require('./package.json').name")"
          echo "Version: $(node -p "require('./package.json').version")"
          echo "Engines: $(node -p "JSON.stringify(require('./package.json').engines)")"
          echo "Karpathy lanes:"
          ls evals/karpathy/ 2>/dev/null || echo "(none)"
