# CI for A1 Suite Local ANT.
#
# Three jobs, run in parallel:
#   1. server     — focused node --test egress policy contract + Karpathy lane
#   2. web-modern — vitest + tsc (1203 component tests, typecheck)
#   3. e2e        — Playwright full stack (92 tests / 26 specs). Only on
#                   push to main, PRs from a non-ant branch, and manual
#                   dispatch — e2e needs both servers running and a
#                   seeded DB, so it's the slow lane.
#
# Why split: web-modern's vitest suite is jsdom-only and doesn't
# need a backend, so it runs faster in isolation. The server suite
# uses node --test and an in-memory :memory: SQLite so it also
# doesn't need a real DB. E2E is the only one that needs `npm run
# dev` (Vite + Fastify) — and that needs to happen in the right
# order with health checks.
#
# Triggers:
#   - push to any branch EXCEPT `ant/**` (the mirror push target, see
#     HANDOFF.md — never test ant pushes). The glob is `ant/**` (not
#     just `ant`) so the orchestrator's `ant/main` integration ref
#     is also excluded.
#   - pull_request targeting main
#   - workflow_dispatch (manual)
#
# Ant is excluded from the trigger filter because:
#   - The `ant` remote points at a private mirror, not the public
#     GitHub repo (mirrors in reverse — see HANDOFF.md security rule)
#   - Workflows only fire on pushes to the same-repo ref, so this
#     is belt-and-suspenders
name: CI

on:
  push:
    branches:
      - "**"
      - "!ant/**"
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────
  # Job 1: Server (Fastify + focused node:test contract). Fast lane.
  # ────────────────────────────────────────────────────────────────────
  server:
    name: Server (node:test, Fastify)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: "npm"

      - name: Install (production only — fast path)
        run: npm ci --omit=dev=false --no-audit --no-fund

      - name: Typecheck server (sanity)
        # Server is JS (CommonJS), so no real typecheck — we just
        # confirm the bundle loads without a require() explosion.
        run: node -e "require('./server/app.js'); console.log('server/app.js loaded ok')"

      - name: Run Karpathy egress contract
        run: npm run karpathy:run -- egress-policy-contract

      - name: Run focused egress node:test suite
        run: node --test --test-concurrency=4 --test-timeout=180000 test/config.test.js test/ai-config.test.js test/ai-provider.test.js test/open-notebook.test.js

  # ────────────────────────────────────────────────────────────────────
  # Job 2: Web-modern (vitest + tsc). Fast lane.
  # ────────────────────────────────────────────────────────────────────
  web-modern:
    name: Web-modern (vitest + tsc)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    defaults:
      run:
        working-directory: web-modern
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: "npm"
          cache-dependency-path: web-modern/package-lock.json

      - name: Install (with Playwright, used by the e2e job)
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Install Playwright chromium
        # Skip --with-deps (needs sudo, slow on first run) — we use
        # the bundled chromium-headless-shell which has no system
        # library deps beyond what's in the GitHub-hosted runner.
        run: npx playwright install chromium

      - name: Typecheck
        run: npm run typecheck

      - name: Vitest
        env:
          NODE_OPTIONS: --no-experimental-webstorage
        run: npm test

      - name: Build (TanStack Start production bundle)
        # A green build is a strong signal: it catches client-only
        # imports that vitest never hits (TanStack Start has
        # server-only code in src/routes/api/).
        run: npm run build

      - name: Upload Playwright report (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web-modern/playwright-report/
          retention-days: 7
          if-no-files-found: ignore

  # ────────────────────────────────────────────────────────────────────
  # Job 3: End-to-end Playwright. Slow lane. Needs:
  #   - Fastify backend on :4100 (the seeded :memory: db is
  #     implicit — but the test login calls /api/login which
  #     needs the seed user; node server/index.js uses a
  #     persistent data/a1.db, so we wipe it first)
  #   - Vite dev server on :4173 (proxies /api/* to :4100)
  # Both are backgrounded; the e2e step waits for them via
  # Playwright's `webServer` config (START_FASTIFY=1 handles
  # Fastify; Vite is started as a background process here).
  # ────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E (Playwright, full stack)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      github.event_name == 'push' && github.ref == 'refs/heads/main' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: web-modern
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: "npm"
          cache-dependency-path: web-modern/package-lock.json

      - name: Install root (for Fastify + node --test deps)
        run: npm ci --no-audit --no-fund
        working-directory: ${{ github.workspace }}

      - name: Install web-modern
        run: npm ci --legacy-peer-deps --no-audit --no-fund
        working-directory: web-modern

      - name: Install Playwright chromium
        run: npx playwright install chromium

      - name: Reset data dir (use the seeded default credentials)
        # The dev server uses data/a1.db if it exists; on a fresh
        # CI runner it doesn't, and the in-process seeder runs on
        # first boot. We delete any leftover so seedUsers() is
        # guaranteed to run.
        run: rm -rf data && mkdir -p data
        working-directory: ${{ github.workspace }}

      - name: Start Vite dev server (background)
        # Vite is not managed by Playwright's webServer config
        # (see playwright.config.ts — we only manage Fastify via
        # START_FASTIFY). We start Vite here and capture its PID
        # for clean teardown.
        run: |
          nohup npx vite dev --port 4173 --strictPort > /tmp/vite.log 2>&1 &
          echo $! > /tmp/vite.pid
          # Wait for Vite to be ready (max 60s)
          for i in {1..60}; do
            if curl -fsS http://localhost:4173/ -o /dev/null 2>&1; then
              echo "Vite ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Start Fastify backend (background)
        # Playwright's `webServer` config would try to spawn
        # `node server/index.js` from the `web-modern/` CWD — but
        # `server/` lives at the project root, so the spawn would
        # fail with MODULE_NOT_FOUND. Instead we start Fastify
        # here from the project root, and let Playwright's
        # `reuseExistingServer: true` pick up the already-listening
        # :4100 socket (see playwright.config.ts).
        run: |
          cd "$GITHUB_WORKSPACE"
          nohup node server/index.js > /tmp/fastify.log 2>&1 &
          echo $! > /tmp/fastify.pid
          # Wait for Fastify to be ready (max 60s)
          for i in {1..60}; do
            if curl -fsS http://localhost:4100/api/health -o /dev/null 2>&1; then
              echo "Fastify ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Run Playwright e2e (smoke — `@smoke`-tagged specs only)
        # Phase 10.10 split: PRs gate on `pnpm test:e2e:smoke` (44 specs
        # currently green at base ref 879165b; see
        # .orchestration/phase10-10-ci-smoke-full-split/audit-runtime.md
        # for the per-spec smoke list). The full 110-spec suite runs
        # nightly on cron (see e2e-full-nightly.yml) where it has time
        # to diagnose the 66 known-failing tests without blocking merges.
        env:
          START_FASTIFY: "1"
          FASTIFY_URL: "http://localhost:4100"
          BASE_URL: "http://localhost:4173"
        run: npm run test:e2e:smoke

      - name: Tail Vite log on failure
        if: failure()
        run: tail -50 /tmp/vite.log || true

      - name: Tail Fastify log on failure
        if: failure()
        run: tail -50 /tmp/fastify.log || true

      - name: Stop background servers
        if: always()
        run: |
          if [ -f /tmp/vite.pid ]; then
            kill "$(cat /tmp/vite.pid)" 2>/dev/null || true
          fi
          if [ -f /tmp/fastify.pid ]; then
            kill "$(cat /tmp/fastify.pid)" 2>/dev/null || true
          fi
