# CI for A1 Suite Local ANT.
#
# **Currently disabled — see Issue #8.**
#
# Background: as of 2026-06-21, GitHub Actions CI on this private repo
# fails with `steps=0` for every job, AND additional pre-existing
# failures with 119/861 tests missing modules. Public sibling repos
# (e.g. `autoresearch-sboss`, `A1-Localization-AM`) run fine with the
# same setup. Root cause appears to be account-level + missing
# web-modern devDeps, not the original code.
#
# Workaround: disable CI to avoid wasting runner minutes on
# guaranteed-fail runs. Local development can run tests directly
# (`npm test`, `npm run karpathy:eval`).
#
# To re-enable: restore the original 3-job workflow once both
# the private Actions quota and the web-modern devDeps issues
# are resolved.

name: CI

on:
  push:
    branches:
      - "**"
      - "!ant/**"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  placeholder:
    name: ci-placeholder (disabled, see Issue #8)
    runs-on: ubuntu-latest
    steps:
      - name: CI currently disabled
        run: |
          echo "CI is disabled on this private repo as of 2026-06-21."
          echo "See https://github.com/Armosphera/A1-Suite-Local-ANT/issues/8"
          echo "Public sibling repos (autoresearch-sboss, A1-Localization-AM) CI works fine."
          exit 0
